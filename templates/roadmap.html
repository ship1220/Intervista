<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="/static/styles.css" />
  <title>Roadmap</title>
</head>
<body>
  <div class="container" style="max-width:800px;margin:40px auto;padding:24px;">
    <h2>Roadmap for {{ role }} {% if designation %} — {{ designation }}{% endif %}</h2>

    <pre style="white-space:pre-wrap;background:#fafafa;border:1px solid #eee;padding:16px;">{{ roadmap }}</pre>

    <div style="margin-top:18px;display:flex;gap:12px;">
      <a href="/index" class="btn">Back to Dashboard</a>
      <a href="/" class="btn outline">Home</a>
    </div>
  </div>
</body>
</html>
