<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="/static/styles.css" />
  <title>{{ module_title }}</title>
</head>
<body>

<nav class="navbar">
  <div class="nav-container">
    <h2 class="logo">
      <img src="/static/new_logo.png" alt="Intervista AI logo" class="logo-img">
      INTERVISTA
    </h2>
    <div class="nav-links">
      <a href="/index">Home</a>
      <a href="/#features">Features</a>
      <a href="/#flow">How it Works</a>
      <a href="/#contact">Contact</a>
    </div>
    <div class="user-menu">
      <button class="user-avatar" id="userAvatar">
        <span class="avatar-circle">{{ username[:1] | upper }}</span>
      </button>
      <div class="user-dropdown" id="userDropdown">
        <div class="user-dropdown-header">
          <div class="user-name">{{ username }}</div>
        </div>
        <a href="/profile" class="dropdown-item">View Profile</a>
        <a href="/progress/" class="dropdown-item">Progress</a>
        <a href="/logout" class="dropdown-item danger">Logout</a>
      </div>
    </div>
  </div>
</nav>

<main>
  <section class="card" id="module-card">
    <div id="module-header">
      <div style="display:flex; align-items:center; gap:12px; flex-wrap:wrap;">
        <h2>{{ module_title }}</h2>
        {% if is_final %}
          <span class="badge" style="background:#fde68a; color:#92400e;">Final Assessment</span>
        {% endif %}
      </div>
      <div style="display:flex; gap:12px; flex-wrap:wrap; margin-top:12px;">
        <a href="/course/{{ course_id }}" class="btn outline">Back to Course</a>
        <a href="/index" class="btn outline">Dashboard</a>
      </div>
    </div>

    <div id="module-loading" style="margin-top:24px; color: var(--text-muted);">
      Loading module content...
    </div>

    <div id="module-content" style="display:none; margin-top:24px;"></div>

    <div id="quiz-result" style="display:none; margin-top:24px;"></div>
  </section>
</main>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
const moduleId = {{ module_id }};
const courseId = {{ course_id }};
const ROLE = "{{ role }}";
const LEVEL = "{{ level }}";
const moduleContent = document.getElementById('module-content');
const moduleLoading = document.getElementById('module-loading');
const quizResult = document.getElementById('quiz-result');

async function loadModule() {
  try {
    const res = await fetch(`/api/module/${moduleId}`);
    if (!res.ok) {
      const error = await res.json();
      throw new Error(error.detail || 'Unable to load module');
    }

    const data = await res.json();
    renderModule(data);
  } catch (err) {
    moduleLoading.textContent = err.message;
    moduleLoading.style.color = '#dc2626';
  }
}

function renderModule(data) {
  moduleLoading.style.display = 'none';
  moduleContent.style.display = 'block';

  const markdown = data.content_markdown || 'No module content available yet.';
  const quiz = Array.isArray(data.quiz) ? data.quiz : [];
  const practiceLinks = Array.isArray(data.practice_links) ? data.practice_links : [];

  let html = `<div class="module-section">${marked.parse(markdown)}</div>`;

  if (practiceLinks.length) {
    html += '<div class="module-section"><h3>Practice Problems</h3><ul style="padding-left:20px;">';
    practiceLinks.forEach((link) => {
      html += `<li style="margin-bottom:10px;"><a href="${link.url}" target="_blank" rel="noopener noreferrer">${link.title}</a></li>`;
    });
    html += '</ul></div>';
  }

  if (quiz.length) {
    html += '<div class="module-section"><h3>Module Quiz</h3>';
    html += '<button id="give-quiz-btn" class="btn" style="margin-bottom:12px;">Give Quiz</button>';
    html += '<div id="quiz-container" style="display:none;">';
    html += '<form id="quiz-form">';

    quiz.forEach((item, index) => {
      html += `<div class="quiz-item" style="margin-bottom:18px;">
        <p><strong>${index + 1}. ${item.question}</strong></p>`;

      (item.options || []).forEach((option, optIndex) => {
        const answerKey = String.fromCharCode(65 + optIndex);
        html += `<label style="display:block; margin-bottom:8px;">
          <input type="radio" name="question-${index}" value="${answerKey}">
          ${answerKey}. ${option}
        </label>`;
      });

      html += '</div>';
    });

    html += '<button type="button" id="submit-quiz" class="btn" style="margin-top:12px;">Submit Quiz</button>';
    html += '</form></div></div>';
  } else {
    html += '<div class="module-section"><p style="color: var(--text-muted);">This module has no quiz.</p></div>';
  }

  moduleContent.innerHTML = html;

  const giveQuizBtn = document.getElementById('give-quiz-btn');
  if (giveQuizBtn) {
    giveQuizBtn.addEventListener('click', () => {
      document.getElementById('quiz-container').style.display = 'block';
      giveQuizBtn.style.display = 'none';
    });
  }

  const submitButton = document.getElementById('submit-quiz');
  if (submitButton) {
    submitButton.addEventListener('click', submitQuiz);
  }
}

async function submitQuiz() {
  const form = document.getElementById('quiz-form');
  const selectedAnswers = [];
  const quizItems = form ? Array.from(form.querySelectorAll('.quiz-item')) : [];

  quizItems.forEach((item, index) => {
    const selected = item.querySelector('input[type="radio"]:checked');
    selectedAnswers.push(selected ? selected.value : '');
  });

  const submitButton = document.getElementById('submit-quiz');
  submitButton.disabled = true;
  submitButton.textContent = 'Submitting...';

  try {
    const res = await fetch(`/api/module/${moduleId}/submit`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ answers: selectedAnswers }),
    });

    const data = await res.json();
    if (!res.ok) {
      throw new Error(data.detail || 'Quiz submission failed');
    }

    renderQuizResult(data);
  } catch (err) {
    quizResult.style.display = 'block';
    quizResult.innerHTML = `<p style="color:#dc2626;">${err.message}</p>`;
  } finally {
    submitButton.disabled = false;
    submitButton.textContent = 'Submit Quiz';
  }
}

function renderQuizResult(data) {
  quizResult.style.display = 'block';
  const passed = data.passed;
  const score = data.score;
  const isFinal = data.is_final;
  const nextModuleId = data.next_module_id;

  let message = `You scored ${score}/3. `;
  if (passed) {
    message += isFinal ? 'Congratulations! You completed the course.' : 'Great job! Module completed.';
  } else {
    message += 'Keep practicing and try again.';
  }

  let buttons = '<div style="margin-top:12px; display:flex; gap:12px; flex-wrap:wrap;">';
  buttons += `<a href="/course/{{ course_id }}" class="btn outline">Back to Course</a>`;

  if (passed) {
    if (isFinal) {
      buttons += `<button class="btn" onclick="window.location.href='/interview/start?course_id=${encodeURIComponent(data.course_id || courseId)}'">Start Interview</button>`;
    } else if (nextModuleId) {
      buttons += `<a href="/module/${nextModuleId}" class="btn">Go to Next Module</a>`;
    }
  } else {
    buttons += '<button class="btn outline" onclick="location.reload()">Retry Quiz</button>';
  }

  buttons += '</div>';

  quizResult.innerHTML = `
    <div class="card" style="padding:16px; background:#f8fafc;">
      <h3>Quiz Result</h3>
      <p>${message}</p>
      ${buttons}
    </div>
  `;
}

loadModule();

const avatar = document.getElementById('userAvatar');
const dropdown = document.getElementById('userDropdown');
avatar.onclick = () => dropdown.classList.toggle('show');
window.onclick = (e) => {
  if (!avatar.contains(e.target) && !dropdown.contains(e.target)) {
    dropdown.classList.remove('show');
  }
};
</script>

</body>
</html>
