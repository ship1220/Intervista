<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="/static/styles.css">
<title>AI Voice Interview</title>
</head>

<body>

<header class="page-header">
<h1>AI Voice Interview</h1>

<div class="top-right">
Logged in as <b>{{ username }}</b>
<a href="/index" class="btn small-btn">Back to Dashboard</a>
<a href="/logout/" class="logout-link">Logout</a>
</div>

</header>


<main>

<!-- ================= LOADING ================= -->

<section id="loading-phase" class="card">

<h2>{{ role }} — {{ level }}</h2>

<div class="status-indicator">
<div class="pulse-dot"></div>
<span id="loading-status">Preparing your interview questions...</span>
</div>

</section>



<!-- ================= INTERVIEW ================= -->

<section id="interview-phase" class="card" style="display:none;">

<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">

<h2>{{ role }} — {{ level }}</h2>

<span class="badge" id="question-counter">Question 1 / 5</span>

</div>


<div id="interviewer-bubble" class="interviewer-bubble">

<div class="bubble-label">AI Interviewer</div>

<p id="current-question"></p>

</div>


<!-- CODING TIMER -->

<div id="coding-timer" style="display:none;margin-top:10px;">
<span>Thinking time: </span>
<b id="timer-value">120</b> seconds
</div>


<div id="voice-status" class="voice-status">

<div class="voice-ring" id="voice-ring"></div>

<span id="voice-status-text">Waiting...</span>

</div>


<div id="transcript-area" style="margin-top:16px;">

<label style="font-size:0.9rem;">Your answer (live transcript):</label>

<textarea
id="live-transcript"
readonly
placeholder="Your speech will appear here..."
style="min-height:80px;opacity:0.85;"></textarea>

</div>


<div style="margin-top:16px;display:flex;gap:12px;flex-wrap:wrap;">

<button id="btn-skip" class="btn outline" style="width:140px;">Skip Question</button>

<button id="btn-end-early" class="btn outline" style="width:180px;">End Interview Early</button>

</div>

</section>



<!-- ================= EVALUATING ================= -->

<section id="evaluating-phase" class="card" style="display:none;">

<h2>Interview Complete</h2>

<div class="status-indicator">
<div class="pulse-dot"></div>
<span id="eval-status">Analyzing your responses...</span>
</div>

</section>

</main>



<script>

(function(){

const ROLE="{{ role }}";
const LEVEL="{{ level }}";
const TOTAL_QUESTIONS=5;



let questions=[];
let answers=[];
let currentIdx=0;

let recognition=null;
let isListening=false;
let answerStartTime=null;



/* ================= SPEECH SYNTHESIS ================= */

function speak(text){

return new Promise(resolve=>{

if(!('speechSynthesis' in window)){resolve();return;}

window.speechSynthesis.cancel();

const utter=new SpeechSynthesisUtterance(text);

utter.rate=1;
utter.pitch=1;

utter.onend=resolve;
utter.onerror=resolve;

window.speechSynthesis.speak(utter);

});

}



/* ================= CODING QUESTION DETECTOR ================= */

function isCodingQuestion(question){

const keywords=[
"write a function",
"write code",
"algorithm",
"leetcode",
"array",
"string",
"hashmap",
"python",
"java",
"c++",
"pseudo"
];

question=question.toLowerCase();

return keywords.some(k=>question.includes(k));

}



/* ================= CODING TIMER ================= */

let timerInterval=null;

function startCodingTimer(seconds){

const box=document.getElementById("coding-timer");
const value=document.getElementById("timer-value");

box.style.display="block";

let remaining=seconds;

value.textContent=remaining;

timerInterval=setInterval(()=>{

remaining--;

value.textContent=remaining;

if(remaining<=0){

clearInterval(timerInterval);

}

},1000);

}

function stopCodingTimer(){

if(timerInterval) clearInterval(timerInterval);

document.getElementById("coding-timer").style.display="none";

}



/* ================= SPEECH RECOGNITION ================= */

const SpeechRecognition=window.SpeechRecognition||window.webkitSpeechRecognition;

function startListening(){

return new Promise((resolve,reject)=>{

if(!SpeechRecognition){
reject(new Error("Speech recognition not supported"));
return;
}

recognition=new SpeechRecognition();

recognition.continuous=true;
recognition.interimResults=true;
recognition.lang="en-US";

let finalTranscript="";
let silenceTimer=null;

const SILENCE_TIMEOUT=10000; // increased silence tolerance

const transcript=document.getElementById("live-transcript");
const statusText=document.getElementById("voice-status-text");
const ring=document.getElementById("voice-ring");

recognition.onstart=()=>{
isListening=true;
statusText.textContent="Listening...";
ring.classList.add("active");
};

recognition.onresult=(event)=>{

clearTimeout(silenceTimer);

let interim="";

for(let i=event.resultIndex;i<event.results.length;i++){

if(event.results[i].isFinal){

finalTranscript+=event.results[i][0].transcript+" ";

}else{

interim+=event.results[i][0].transcript;

}

}

transcript.value=finalTranscript+interim;

silenceTimer=setTimeout(()=>{

recognition.stop();

},SILENCE_TIMEOUT);

};

recognition.onend=()=>{

isListening=false;
ring.classList.remove("active");

resolve(finalTranscript.trim());

};

recognition.start();

});

}

function stopListening(){

if(recognition&&isListening){

recognition.stop();

}

}



/* ================= INTERVIEW LOOP ================= */

async function runInterview(){

document.getElementById("loading-phase").style.display="none";
document.getElementById("interview-phase").style.display="block";

for(currentIdx=0;currentIdx<questions.length;currentIdx++){

const q=questions[currentIdx];

document.getElementById("question-counter").textContent=`Question ${currentIdx+1} / ${questions.length}`;

document.getElementById("current-question").textContent=q;

document.getElementById("live-transcript").value="";

await speak(q);



/* coding question thinking time */

if(isCodingQuestion(q)){

startCodingTimer(120);

await new Promise(r=>setTimeout(r,120000));

stopCodingTimer();

}



answerStartTime=new Date().toISOString();

let answerText="";

try{

answerText=await startListening();

}catch(e){

answerText="";

}

const answerEndTime=new Date().toISOString();

const duration=Math.max(1,Math.round((new Date(answerEndTime)-new Date(answerStartTime))/1000));

answers.push({

question:q,
answer:answerText||"(no response)",
start_time:answerStartTime,
end_time:answerEndTime,
duration:duration

});

}

evaluateAll();

}



/* ================= API ================= */

async function fetchQuestions(){

const resp=await fetch(`/api/interview/questions?role=${encodeURIComponent(ROLE)}&level=${encodeURIComponent(LEVEL)}&count=${TOTAL_QUESTIONS}`);

const data=await resp.json();

return data.questions||[];

}



async function evaluateAll(){

document.getElementById("interview-phase").style.display="none";
document.getElementById("evaluating-phase").style.display="block";

await fetch("/api/interview/evaluate",{

method:"POST",
headers:{"Content-Type":"application/json"},

body:JSON.stringify({

role:ROLE,
level:LEVEL,
questions_answers:answers

})

});

window.location.href="/report";

}



/* ================= INIT ================= */

(async function(){

try{

questions=await fetchQuestions();

if(!questions.length) throw new Error("No questions");

document.getElementById("loading-status").textContent="Starting interview...";

setTimeout(runInterview,600);

}catch(err){

document.getElementById("loading-status").textContent="Error loading questions";

}

})();

})();

</script>

</body>
</html>
