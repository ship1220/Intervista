<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="/static/styles.css" />
  <title>Mock Interview</title>
</head>
<body>

  <header class="page-header">
    <h1>🎤 Mock Interview</h1>

    <div class="top-right">
      Logged in as <b>{{username}}</b>
      <a href="/index" class="btn small-btn">Back to Dashboard</a>
      <a href="/logout/" class="logout-link">Logout</a>
    </div>
  </header>

  <main>

    <section class="card">
      <h2>{{ role }} - {{ level }}</h2>
      <p style="color: var(--text-muted); margin-bottom: 10px;">Round: <span id="round-display">1</span> | Difficulty: <span id="difficulty-display">easy</span></p>
    </section>

    <section id="question-area" class="card">
      <h3>Question</h3>
      <p id="question" style="font-size: 1.1rem; color: var(--primary); margin-bottom: 20px;">{{ question }}</p>

      <form id="answer-form">
        <textarea 
          id="answer" 
          placeholder="Type your answer here..." 
          style="min-height: 150px;"
          required
        ></textarea>
         <p id="speech-analysis" style="margin-top:10px; color:#c1fff0;"></p>
    <div style="margin-top:10px; display:flex; gap:10px; align-items:center;">
      <button type="button" id="start-rec-btn" class="btn">🎤 Start Recording</button>
      <button type="button" id="stop-rec-btn" class="btn">⏹ Stop Recording</button>
      <span id="rec-status" style="color:var(--text-muted); font-size:0.95rem; margin-left:8px">Microphone: unknown</span>
    </div>

        <button type="submit" id="submit-btn" class="btn">Submit Answer</button>
      </form>
    </section>

    <section id="feedback-area" class="card" style="display:none;">
      <h3>📝 Feedback</h3>
      <p id="feedback" style="color: var(--text-muted); line-height: 1.6;"></p>
      <button id="next-btn" class="btn" style="margin-top: 20px;">Next Question</button>
    </section>

  </main>

  <script>
    const answerForm = document.getElementById("answer-form");
    const submitBtn = document.getElementById("submit-btn");
    const nextBtn = document.getElementById("next-btn");
    const questionArea = document.getElementById("question-area");
    const feedbackArea = document.getElementById("feedback-area");
    const questionDisplay = document.getElementById("question");
    const feedbackDisplay = document.getElementById("feedback");
    const answerInput = document.getElementById("answer");
    const roundDisplay = document.getElementById("round-display");
    const difficultyDisplay = document.getElementById("difficulty-display");

    // Submit answer
    answerForm.addEventListener("submit", async function (e) {
      e.preventDefault();

      const answer = answerInput.value.trim();

      if (!answer) {
        alert("Please enter your answer.");
        return;
      }

      try {
        submitBtn.disabled = true;
        submitBtn.innerText = "Submitting...";

        const response = await fetch("/submit_answer/", {
          method: "POST",
          headers: { "Content-Type": "application/x-www-form-urlencoded" },
          body: new URLSearchParams({ answer })
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || "Submission failed.");
        }

        // Show feedback
        questionArea.style.display = "none";
        feedbackArea.style.display = "block";
        feedbackDisplay.innerText = data.feedback;

        // Store next question and session data for use when clicking next
        nextBtn.dataset.nextQuestion = data.next_question;

        feedbackArea.scrollIntoView({ behavior: "smooth" });

      } catch (err) {
        alert(err.message || "Server error.");
      } finally {
        submitBtn.disabled = false;
        submitBtn.innerText = "Submit Answer";
      }
    });

    // Move to next question
    nextBtn.addEventListener("click", function () {
      const nextQuestion = nextBtn.dataset.nextQuestion;

      if (!nextQuestion) {
        alert("No next question available.");
        return;
      }

      questionDisplay.innerText = nextQuestion;
      answerInput.value = "";

      feedbackArea.style.display = "none";
      questionArea.style.display = "block";

      questionArea.scrollIntoView({ behavior: "smooth" });
    });
    let mediaRecorder;
    let audioChunks = [];

    const startBtn = document.getElementById('start-rec-btn');
    const stopBtn = document.getElementById('stop-rec-btn');
    const recStatus = document.getElementById('rec-status');

    // feature detect
    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
      recStatus.innerText = 'Microphone not supported in this browser';
      startBtn.disabled = true;
      stopBtn.disabled = true;
    } else {
      recStatus.innerText = 'Microphone: ready';
    }

    startBtn.addEventListener('click', async () => {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mediaRecorder = new MediaRecorder(stream);
        audioChunks = [];

        mediaRecorder.ondataavailable = event => audioChunks.push(event.data);
        mediaRecorder.start();
        recStatus.innerText = 'Recording...';
        startBtn.disabled = true;
        stopBtn.disabled = false;
      } catch (err) {
        recStatus.innerText = 'Microphone denied or error';
        alert('Could not start recording: ' + (err.message || err));
      }
    });

    stopBtn.addEventListener('click', async () => {
      if (!mediaRecorder) return;
      mediaRecorder.stop();
      recStatus.innerText = 'Processing...';
      startBtn.disabled = false;
      stopBtn.disabled = true;

      mediaRecorder.onstop = async () => {
        try {
          const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
          const formData = new FormData();
          formData.append('audio', audioBlob, 'answer.webm');

          const resp = await fetch('/speech_to_text/', { method: 'POST', body: formData });
          const data = await resp.json();

          document.getElementById('answer').value = data.text || '';
          if (data.analysis) {
            document.getElementById('speech-analysis').innerHTML =
              `🗣️ <b>Speech Stats</b><br>
               Words: ${data.analysis.word_count}<br>
               Speed: ${data.analysis.wpm} WPM<br>
               Fillers: ${data.analysis.filler_count}`;
          }
          recStatus.innerText = 'Ready';
        } catch (err) {
          recStatus.innerText = 'Error uploading audio';
          alert('Upload error: ' + (err.message || err));
        }
      };
    });
  </script>

</body>
</html>
