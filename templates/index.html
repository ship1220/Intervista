<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="/static/styles.css" />
  <title>Job PrepMate</title>
</head>
<body>

  <header class="page-header">
    <h1>Job PrepMate</h1>

    <div class="top-right">
      Logged in as <b>{{username}}</b>
      <a href="/logout/" class="logout-link">Logout</a>
      <a href="/progress/" class="btn small-btn">View Progress</a>
    </div>
  </header>

  <main>

    <section id="input-section" class="card">
      <h2>Start Your Learning Journey</h2>

      <form id="start-form">
        <label for="role">Job Role</label>
        <input type="text" id="role" name="role" placeholder="e.g. Data Analyst" required>

        <label for="level">Designation / Level</label>
        <select id="level" name="level" required>
          <option value="">-- Select Level --</option>
          <option value="intern">Intern</option>
          <option value="junior">Junior</option>
          <option value="mid">Mid-Level</option>
          <option value="senior">Senior</option>
        </select>

        <label for="resume">Resume (optional)</label>
        <input type="file" id="resume" accept=".pdf,.docx" />
        <small id="resume-status" style="color: var(--text-muted); font-size: 0.85rem;">
          Upload PDF or DOCX to get personalized interview questions
        </small>

        <button type="submit" id="start-btn">Start Learning</button>
      </form>
    </section>

    <section id="choices-section" class="card" style="display:none;">
      <h2>What would you like to do?</h2>
      <p id="role-display" style="color: var(--text-muted); margin-bottom: 20px;"></p>

      <div style="display:flex;gap:16px;flex-wrap:wrap;justify-content:center;">
        <form id="interview-form" method="post" action="/start_interview/">
          <input type="hidden" id="hidden-role" name="role">
          <input type="hidden" id="hidden-level" name="level">
          <button type="submit" class="btn" style="width:220px;" id="btn-interview">
            Take Voice Interview
          </button>
        </form>

        <form id="roadmap-form" method="post" action="/generate_course/">
          <input type="hidden" id="hidden-role-roadmap" name="role">
          <input type="hidden" id="hidden-designation" name="level">
          <button type="submit" class="btn outline" style="width:220px;" id="btn-course">
            Generate Course
          </button>
        </form>
      </div>
    </section>

  </main>

  <script>
  const startForm = document.getElementById("start-form");
  const choicesSection = document.getElementById("choices-section");
  const inputSection = document.getElementById("input-section");

  // Show choices when form is submitted
  startForm.addEventListener("submit", async function (e) {
    e.preventDefault();

    const role = document.getElementById("role").value.trim();
    const level = document.getElementById("level").value;
    const resumeFile = document.getElementById("resume").files[0];

    if (!role || !level) {
      alert("Please fill all fields.");
      return;
    }

    const startBtn = document.getElementById("start-btn");

    // Upload resume if provided
    if (resumeFile) {
      startBtn.textContent = "Uploading resume...";
      startBtn.disabled = true;
      const fd = new FormData();
      fd.append("file", resumeFile);
      try {
        const resp = await fetch("/api/upload_resume", { method: "POST", body: fd });
        if (resp.ok) {
          document.getElementById("resume-status").textContent = "\u2705 Resume uploaded successfully";
          document.getElementById("resume-status").style.color = "#22c55e";
        } else {
          const err = await resp.json();
          alert("Resume upload failed: " + (err.detail || "Unknown error"));
          startBtn.textContent = "Start Learning";
          startBtn.disabled = false;
          return;
        }
      } catch (err) {
        alert("Resume upload error: " + err.message);
        startBtn.textContent = "Start Learning";
        startBtn.disabled = false;
        return;
      }
      startBtn.textContent = "Start Learning";
      startBtn.disabled = false;
    }

    // Hide input section, show choices section
    inputSection.style.display = "none";
    choicesSection.style.display = "block";

    // Display selected role and level
    document.getElementById("role-display").innerText = `Role: ${role} | Level: ${level}`;

    // Set hidden values for both forms
    document.getElementById("hidden-role").value = role;
    document.getElementById("hidden-level").value = level;
    document.getElementById("hidden-role-roadmap").value = role;
    document.getElementById("hidden-designation").value = level;

  // Show choices section smoothly
    choicesSection.scrollIntoView({ behavior: "smooth" });
  });

  // Add loading states to buttons on submit
  document.getElementById('interview-form').addEventListener('submit', () => {
    document.getElementById('btn-interview').textContent = 'Starting interview...';
    document.getElementById('btn-interview').disabled = true;
  });
  document.getElementById('roadmap-form').addEventListener('submit', () => {
    document.getElementById('btn-course').textContent = 'Loading...';
    document.getElementById('btn-course').disabled = true;
  });
  </script>

</body>
</html>
