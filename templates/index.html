<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="/static/styles.css" />
  <title>Job PrepMate</title>
</head>
<body>

  <h1>Job PrepMate👩‍💻✍🏼</h1>

  <div class="top-right">
    Logged in as <b>{{username}}</b> |
    <a href="/logout" style="color:#530101;">Logout</a>
    <a href="/progress" class="btn">📈 View Progress</a>
  </div>

  <h2>🎤 Start Mock Interview</h2>

  <form id="start-form">
    <label for="role">✒️ Job Role:</label>
    <input type="text" id="role" name="role" placeholder="e.g. Data Analyst" required>

    <label for="level">🎯 Designation / Level:</label>
    <select id="level" name="level" required>
      <option value="">-- Select Level --</option>
      <option value="intern">Intern</option>
      <option value="junior">Junior</option>
      <option value="mid">Mid-Level</option>
      <option value="senior">Senior</option>
    </select>

    <button type="button" onclick="startInterview()">Start Interview</button>
  </form>

  <hr>

  <div id="question-area" style="display:none;">
    <h3>📝 Question:</h3>
    <p id="question"></p>

    <textarea id="answer" placeholder="Type your answer here..."></textarea>
    <p id="speech-analysis" style="margin-top:10px; color:#c1fff0;"></p>
    <div style="margin-top:10px;">
      <button type="button" onclick="startRecording()">🎤 Start Recording</button>
      <button type="button" onclick="stopRecording()">⏹ Stop Recording</button>
    </div>
    <button type="button" onclick="submitAnswer()">Submit Answer</button>
  </div>

  <div id="feedback-area" style="display:none;">
    <h3>🌻 Feedback:</h3>
    <p id="feedback"></p>
  </div>

  <script>
    async function startInterview() {
      const role = document.getElementById("role").value;
      const level = document.getElementById("level").value;

      const response = await fetch("/start_interview/", {
        method: "POST",
        headers: { "Content-Type": "application/x-www-form-urlencoded" },
        body: `role=${encodeURIComponent(role)}&level=${encodeURIComponent(level)}`
      });

      const data = await response.json();

      document.getElementById("question-area").style.display = "block";
      document.getElementById("feedback-area").style.display = "none";
      document.getElementById("question").innerText = data.question || "⚠️ Error starting interview.";
    }

    async function submitAnswer() {
      const answer = document.getElementById("answer").value;

      const response = await fetch("/submit_answer/", {
        method: "POST",
        headers: { "Content-Type": "application/x-www-form-urlencoded" },
        body: `answer=${encodeURIComponent(answer)}`
      });

      const data = await response.json();

      document.getElementById("feedback-area").style.display = "block";
      document.getElementById("feedback").innerText = data.feedback || "⚠️ Error generating feedback.";

      // next question auto-load
      if (data.next_question) {
        document.getElementById("question").innerText = data.next_question;
        document.getElementById("answer").value = "";
      }
    }

    let mediaRecorder;
    let audioChunks = [];

    // Start recording
    async function startRecording() {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      mediaRecorder = new MediaRecorder(stream);
      audioChunks = [];
    
      mediaRecorder.ondataavailable = event => {
        audioChunks.push(event.data);
      };
    
      mediaRecorder.start();
      alert("Recording started...");
    }
    
    // Stop recording
    function stopRecording() {
      mediaRecorder.stop();
      mediaRecorder.onstop = async () => {
        const audioBlob = new Blob(audioChunks, { type: "audio/webm" });
        const formData = new FormData();
        formData.append("audio", audioBlob);
  
        const response = await fetch("/speech_to_text/", {
          method: "POST",
          body: formData
        });
  
        const data = await response.json();
  
        // ✅ THIS IS THE KEY LINE
        document.getElementById("answer").value = data.text || "";
        if (data.analysis) {
          document.getElementById("speech-analysis").innerHTML =
            `🗣️ <b>Speech Stats</b><br>
             Words: ${data.analysis.word_count}<br>
             Speed: ${data.analysis.wpm} WPM<br>
             Fillers: ${data.analysis.filler_count}`;
        }   
        alert("Speech converted to text!");
      };
  }
  </script>

</body>
</html>
